<html lang="he">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>השוואת חברות</title>
<script src="https://cdn.jsdelivr.net/npm/eruda"></script>

    



    
        <style>
        body {
    font-family: Arial, sans-serif;

.container {
    max-width: 900px;
    margin: auto;

body {
    font-family: Arial, sans-serif;
    direction: rtl;
    padding: 20px;
}

.container {
    max-width: 900px;
    margin: auto;
}

h1 {
    text-align: center;
}

select {
    width: 100%;
    padding: 10px;
    margin: 10px 0;
    border-radius: 5px;
    border: 1px solid #ccc;
}

button {
    padding: 10px 20px;
    background-color: #4CAF50;
    color: white;
    border: none;
    border-radius: 5px;
    cursor: pointer;
}

button:hover {
    background-color: #45a049;
}

table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 20px;
}

table th, table td {
    border: 1px solid #ddd;
    padding: 8px;
    text-align: center;
}

table th {
    background-color: #f2f2f2;
}

canvas {
    margin-top: 20px;
    width: 100%;
    height: 400px;
}
    </style>
</head>
<body>
    <div class="container">
        <h1>השוואת חברות</h1>
        
        <!-- טופס הבחירה -->
        <label for="companies">בחר חברות להשוואה:</label>
        <select id="companies" multiple>
            <!-- רשימה תתמלא באמצעות JavaScript -->
        </select>

        <button id="compareButton">השווה</button>

        <!-- טבלה להצגת הנתונים -->
        <table id="comparisonTable">
            <thead>
                <tr>
                    <th>חברה</th>
                    <th>תשואה שנה</th>
                    <th>תשואה 3 שנים</th>
                    <th>תשואה 5 שנים</th>
                </tr>
            </thead>
            <tbody>
                <!-- נתונים יתווספו כאן -->
            </tbody>
        </table>

        <!-- גרף עמודות -->
        <canvas id="comparisonChart"></canvas>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    
    <script>
        eruda.init(); 
        // טוען את הנתונים מקובץ JSON וממלא את רשימת החברות
        let datanetunimKlaliXa = []; // נניח שהנתונים נטענים כאן

        fetch('datajson.json')
            .then(response => response.json())
            .then(data => {
                datanetunimKlaliXa = data;
                const companiesSelect = document.getElementById('companies');
                
                datanetunimKlaliXa.forEach(company => {
                    const option = document.createElement('option');
                    option.value = company.menahelet;
                    option.textContent = company.menahelet;
                    companiesSelect.appendChild(option);
                });
            });

        document.getElementById('compareButton').addEventListener('click', () => {
            const selectedCompanies = Array.from(document.getElementById('companies').selectedOptions).map(option => option.value);

            const selectedData = datanetunimKlaliXa.filter(company => selectedCompanies.includes(company.menahelet));

            // עדכון הטבלה
            const tableBody = document.querySelector('#comparisonTable tbody');
            tableBody.innerHTML = ''; // ניקוי הטבלה
            selectedData.forEach(company => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${company.menahelet}</td>
                    <td>${company.tesuam}%</td>
                    <td>${company.tesuam36}%</td>
                    <td>${company.tesuam60}%</td>
                `;
                tableBody.appendChild(row);
            });

            // יצירת גרף עמודות
            const labels = selectedData.map(company => company.menahelet);
            const tesuamData = selectedData.map(company => company.tesuam);
            const tesuam36Data = selectedData.map(company => company.tesuam36);
            const tesuam60Data = selectedData.map(company => company.tesuam60);

            const ctx = document.getElementById('comparisonChart').getContext('2d');
            new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [
                        {
                            label: 'תשואה שנה',
                            data: tesuamData,
                            backgroundColor: 'rgba(75, 192, 192, 0.2)',
                            borderColor: 'rgba(75, 192, 192, 1)',
                            borderWidth: 1
                        },
                        {
                            label: 'תשואה 3 שנים',
                            data: tesuam36Data,
                            backgroundColor: 'rgba(153, 102, 255, 0.2)',
                            borderColor: 'rgba(153, 102, 255, 1)',
                            borderWidth: 1
                        },
                        {
                            label: 'תשואה 5 שנים',
                            data: tesuam60Data,
                            backgroundColor: 'rgba(255, 159, 64, 0.2)',
                            borderColor: 'rgba(255, 159, 64, 1)',
                            borderWidth: 1
                        }
                    ]
                },
                options: {
                    responsive: true,
                    scales: {
                        y: {
                            beginAtZero: true
                        }
                    }
                }
            });
        });
    </script>
</body>
</html>
