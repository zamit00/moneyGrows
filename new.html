<!DOCTYPE html>
<html lang="he">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>השוואת חברות</title>
    <script src="https://cdn.jsdelivr.net/npm/eruda"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            direction: rtl;
            padding: 20px;
        }
        .container {
            max-width: 900px;
            margin: auto;
        }
        h1 {
            text-align: center;
        }
        select, button {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 5px;
            border: 1px solid #ccc;
        }
        button {
            background-color: #4CAF50;
            color: white;
            cursor: pointer;
        }
        button:hover {
            background-color: #45a049;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        table th, table td {
            border: 1px solid #ddd;
            padding: 8px;
            text-align: center;
        }
        table th {
            background-color: #f2f2f2;
        }
        .chart-container {
            margin-top: 20px;
            width: 100%;
            height: 400px;
        }
        #comparisonTable{
            max-width:90vw;
            margin-left:5vw;
            box-sizing:border-box;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>השוואת חברות</h1>

        <label for="companies">בחר חברות להשוואה:</label>
        <select id="companies" onchange='changmoz()' multiple ></select>

        <label for="sugMMen">בחר מוצר</label>
        <select id="sugMMen" onchange='changmoz()' >
            <option value="" disabled selected>בחר מוצר</option>
            <option value="קרנות השתלמות">קרנות השתלמות</option>
            <option value="תגמולים ואישית לפיצויים">קופות גמל</option>
            <option value="קופת גמל להשקעה">קופת גמל להשקעה</option>
            <option value="חסכון לילד">חסכון לילד</option>
        </select>

        <label for="selectShemkupa">בחר מסלול</label>
        <select id="selectShemkupa" onchange='changmoz()' ></select>

        <button id="compareButton">השווה</button>

        <table id="comparisonTable">
            <thead>
                <tr>
                    <th>חברה</th>
                    <th>שם המסלול</th>
                    <th>תשואה שנה</th>
                    <th>תשואה 3 שנים</th>
                    <th>תשואה 5 שנים</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>

        <div class="chart-container"><canvas id="yearChart"></canvas></div>
        <div class="chart-container"><canvas id="threeYearChart"></canvas></div>
        <div class="chart-container"><canvas id="fiveYearChart"></canvas></div>
    </div>

    <script>
        /*eruda.init();*/

        let datanetunimKlaliXa = [];
        const mozkoch = [
  'קרנות השתלמות', 'תגמולים ואישית לפיצויים', 'קופת גמל להשקעה',
  "קופת גמל להשקעה - חסכון לילד", "מרכזית לפיצויים"
];
const hishtalmot=[
  "כללי",
  "עוקב מדד s&p 500",
  "מניות",
  "אשראי ואג\"ח",
  "אשראי ואג\"ח עם מניות",
  "כספי (שקלי)",
  "עוקב מדדים - גמיש",
  "אג\"ח ממשלות",
  "הלכה יהודית",
  "משולב סחיר",
  "עוקב מדדי אג\"ח",
  "עוקב מדדי מניות",
  "אג\"ח סחיר",
  "מניות סחיר"
  
];
const gemel=[
  "מניות",
  "50-60",
  "עוקב מדד s&p 500",
  "עד 50",  
  "60 ומעלה",
  "אשראי ואג\"ח",
  "כספי (שקלי)",
  "משולב סחיר",
  "עוקב מדדים - גמיש",
  "אג\"ח ממשלות",
  "הלכה יהודית",
  "מניות סחיר",
  "עוקב מדדי אג\"ח",
  "עוקב מדדי מניות",
  "אג\"ח סחיר"
  ];
const layeled=['סיכון מועט','סיכון בינוני','סיכון מוגבר','הלכה יהודית']
function changmoz(){
document.getElementById('comparisonTable').style.display='none';
document.getElementById('yearChart').style.display='none';
document.getElementById('threeYearChart').style.display='none';
document.getElementById('fiveYearChart').style.display='none';
    }
        async function fetchdataJasonX() {
            try {
                const response = await fetch('dataJason.json');
                if (!response.ok) throw new Error(`שגיאה: ${response.status} ${response.statusText}`);
                datanetunimKlaliXa = await response.json();

                
                const uniqueMenahelet = [...new Set(datanetunimKlaliXa.map(company => company.menahelet))];
                const companiesSelect = document.getElementById('companies');
                uniqueMenahelet.forEach(menahelet => {
                    const option = document.createElement('option');
                    option.value = menahelet;
                    option.textContent = menahelet;
                    companiesSelect.appendChild(option);
                });
            } catch (error) {
                console.error('שגיאה בשליפת הנתונים:', error);
            }
        }

        window.onload = fetchdataJasonX;

        document.getElementById('sugMMen').addEventListener('change', function () {
            const selectedProduct = this.value;
            const selectShemkupa = document.getElementById('selectShemkupa');
            selectShemkupa.innerHTML = '';

            let relevantList;
            if (selectedProduct === "קרנות השתלמות" || selectedProduct === "קופת גמל להשקעה") {
                relevantList = hishtalmot;
            } else if (selectedProduct === "תגמולים ואישית לפיצויים") {
                relevantList = gemel;
            } else if (selectedProduct === "חסכון לילד") {
                relevantList = layeled;
            }

           /* const uniqueMaslulim = [...new Set(relevantList.map(item => item.shemkupa))];*/
           for(let i=0;i<relevantList.length;i++){
            const option = document.createElement('option');
                option.value = relevantList[i];
                option.textContent = relevantList[i];
                selectShemkupa.appendChild(option);
           }
            
            
                
            
        });

        document.getElementById('compareButton').addEventListener('click', () => {
         document.getElementById('comparisonTable').style.display='block';
         document.getElementById('yearChart').style.display='block';
         document.getElementById('threeYearChart').style.display='block';
         document.getElementById('fiveYearChart').style.display='block';

            const selectedCompanies = Array.from(document.getElementById('companies').selectedOptions).map(option => option.value);
            const selectedProduct = document.getElementById('sugMMen').value;
            const selectedMaslul = document.getElementById('selectShemkupa').value;

            const selectedData = datanetunimKlaliXa.filter(item =>
                item.mozar === selectedProduct &&
                item.mas === selectedMaslul &&
                selectedCompanies.includes(item.menahelet)
            );
            selectedData.sort((a, b) => b.tesuam - a.tesuam);

            updateTable(selectedData);
            updateCharts(selectedData);
        });

        function updateTable(data) {
            const tableBody = document.querySelector('#comparisonTable tbody');
            tableBody.innerHTML = '';
            data.forEach(company => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${company.menahelet}</td>
                    <td>${company.shemkupa}</td>
                    <td>${company.tesuam}%</td>
                    <td>${company.tesuam36}%</td>
                    <td>${company.tesuam60}%</td>
                `;
                tableBody.appendChild(row);
            });
        }

        let yearChart, threeYearChart, fiveYearChart;

function createChart(ctx, label, data) {
    const backgroundColors = [
        'rgba(255, 99, 132, 0.6)',
        'rgba(54, 162, 235, 0.6)',
        'rgba(255, 206, 86, 0.6)',
        'rgba(75, 192, 192, 0.6)',
        'rgba(153, 102, 255, 0.6)',
        'rgba(255, 159, 64, 0.6)',
        'rgba(199, 199, 199, 0.6)'
    ];

    const borderColors = backgroundColors.map(color => color.replace('0.6', '1'));

    return new Chart(ctx, {
        type: 'bar',
        data: {
            labels: data.labels,
            datasets: [{
                label: label,
                data: data.values,
                backgroundColor: backgroundColors.slice(0, data.values.length),
                borderColor: borderColors.slice(0, data.values.length),
                borderWidth: 1
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            scales: {
                y: { beginAtZero: true }
            }
        }
    });
}

        function updateCharts(selectedData) {
            const labels = selectedData.map(item => item.menahelet);
            const yearData = selectedData.map(item => item.tesuam);
            const threeYearData = selectedData.map(item => item.tesuam36);
            const fiveYearData = selectedData.map(item => item.tesuam60);

            if (yearChart) yearChart.destroy();
            if (threeYearChart) threeYearChart.destroy();
            if (fiveYearChart) fiveYearChart.destroy();

            yearChart = createChart(document.getElementById('yearChart').getContext('2d'), 'תשואה שנה', { labels, values: yearData });
            threeYearChart = createChart(document.getElementById('threeYearChart').getContext('2d'), 'תשואה 3 שנים', { labels, values: threeYearData });
            fiveYearChart = createChart(document.getElementById('fiveYearChart').getContext('2d'), 'תשואה 5 שנים', { labels, values: fiveYearData });
        }
    </script>
</body>
</html>
