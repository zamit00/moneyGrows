<!DOCTYPE html>
<html lang="he">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>keseftsomeach</title>
    
    <!-- אייקונים -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    
    <script>
        function clsw() {
            window.close();
        }

        function opn(id) {
            document.getElementById(id).classList.toggle("show");
        }

        function onch() {
            console.log("ערך השתנה");
        }

        function hashev(rate) {
            console.log("חישוב לפי ריבית: " + rate);
        }

        function othribit() {
            console.log("נבחרה ריבית אחרת");
        }
    </script>
    <script src="ribit.js" defer></script>

    <style>
        /* עיצוב כללי */
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f0f8ff; /* רקע כחול בהיר */
            color: #333;
            text-align: center;
        }

        /* כפתור סגירת חלון */
        .closewindow {
            color: white;
            background-color: #005a87; /* כחול כהה */
            border-radius: 50%;
            width: 30px;
            height: 30px;
            text-align: center;
            line-height: 30px;
            font-weight: bold;
            cursor: pointer;
            position: fixed;
            right: 20px;
            top: 20px;
            transition: background 0.3s;
        }
        .closewindow:hover {
            background-color: #007bb5; /* כחול בהיר */
        }

        /* כותרת ולוגו */
        header {
            width: 100%;
            height: 100px;
            background: linear-gradient(90deg, #007bb5, #00a86b); /* מעבר בין כחול לירוק */
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }
        .logo {
            width: 80px;
            height: 80px;
            cursor: pointer;
        }

        /* כותרת ראשית */
        .kotamod h1 {
            color: #007bb5;
            font-size: 28px;
            margin: 20px 0;
        }

        /* עיצוב הכפתורים */
        button {
            background: #00a86b;
            color: white;
            border: none;
            padding: 12px 20px;
            margin: 10px;
            font-size: 16px;
            border-radius: 25px;
            cursor: pointer;
            transition: background 0.3s, transform 0.2s;
        }
        button:hover {
            background: #007bb5;
            transform: scale(1.05);
        }

        /* עיצוב התפריטים הנפתחים */
        .dropdown-sug, .dropdown-schom, .dropdown-tkofa {
            display: none;
            background: white;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
            border-radius: 10px;
            padding: 10px;
            position: absolute;
            width: 200px;
            text-align: right;
        }
        .show {
            display: block;
        }
        .dropdown-sug div, .dropdown-schom div, .dropdown-tkofa div {
            padding: 8px 10px;
        }
        .rdbutton {
            margin-left: 5px;
        }

        /* תיבת תוצאות */
        .alltoz {
            background: white;
            margin: 20px auto;
            padding: 15px;
            width: 50%;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            border-radius: 10px;
        }
        .kottoz {
            font-weight: bold;
            color: #00a86b;
            margin-bottom: 10px;
        }

        /* שדות קלט */
        .txtbutton, select {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        /* עיצוב תוצאות */
        .tozaot {
            margin: 20px auto;
            padding: 15px;
            width: 50%;
            background: #e0f2f1;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }
    </style>
</head>
<body dir="rtl">
    <div class='closewindow' onclick='clsw()'>X</div>
    <header>
        <img src="logoa.png" class="logo" onclick="fetchAllNetunim()">    
    </header>

    <main>
        <div class="kotamod">
            <h1>מחשבון השקעה ריבית דריבית</h1>
        </div>

        <div class="sughashkaa">
            <button id="sug" onclick="opn('dropdown-sug')">בחר סוג השקעה <i class="fa fa-arrow-down"></i></button>
            <div class="dropdown-sug" id="dropdown-sug">
                <div><input type="radio" class="rdbutton" id="rdbutton1" name="sughash" onchange="onch()"> <label for="rdbutton1">סכום חד פעמי</label></div>
                <div><input type="radio" class="rdbutton" id="rdbutton2" name="sughash" onchange="onch()"> <label for="rdbutton2">סכום בתשלומים חודשיים</label></div>
                <div><input type="radio" class="rdbutton" id="rdbutton3" name="sughash" checked onchange="onch()"> <label for="rdbutton3">חד פעמי + חודשי</label></div>
            </div>
        </div>

        <div class="schomhashkaa">
            <button id="schom" onclick="opn('dropdown-schom')">בחר סכום השקעה <i class="fa fa-arrow-down"></i></button>
            <div class="dropdown-schom" id="dropdown-schom">
                <div><label>סכום חד פעמי</label> <input onchange="onch()" type="number" class="txtbutton" id="hadpeami" min="1000" step="500"></div>
                <div><label>סכום חודשי</label> <input onchange="onch()" type="number" class="txtbutton" id="hodshi" min="50" step="50"></div>
            </div>
        </div>

        <button id="hashev" onclick="hashev(0.04)">חשב</button>

        <div class="alltoz">
            <div class="kottoz">לפי ריבית 4% שנתי:</div>
            <label>בחר ריבית אחרת</label>
            <select class="selecttoz" id="selecttoz" onchange="othribit()"></select>
        </div>

        <div class="tozaot" id="tozaot" style="display: block;"></div>
    </main>
</body>
</html>
