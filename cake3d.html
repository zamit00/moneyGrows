
<!DOCTYPE html>
<html dir="rtl">
<head>
    <style>
        .pie-menu-container {
            position: relative;
            height: 400px;
            width: 400px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .center-button {
            position: absolute;
            z-index: 50;
            width: 64px;
            height: 64px;
            border-radius: 50%;
            background-color: #3b82f6;
            color: white;
            border: none;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            cursor: pointer;
            transition: transform 0.5s ease-in-out;
        }

        .menu-item {
            position: absolute;
            width: 56px;
            height: 56px;
            border-radius: 50%;
            color: white;
            border: none;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            cursor: pointer;
            transition: all 0.5s ease-in-out;
            opacity: 0;
        }

        .center-button:hover, .menu-item:hover {
            transform: scale(1.1);
        }
    </style>
</head>
<body>
    <div class="pie-menu-container" id="pieMenu">
        <button class="center-button" onclick="toggleMenu()">תפריט</button>
    </div>

    <script>
        const menuItems = [
            { label: 'בית', color: '#FF6B6B' },
            { label: 'פרופיל', color: '#4ECDC4' },
            { label: 'הודעות', color: '#45B7D1' },
            { label: 'הגדרות', color: '#96CEB4' },
            { label: 'עזרה', color: '#FFEEAD' },
            { label: 'התנתק', color: '#D4A5A5' }
        ];

        let isOpen = false;
        let rotation = 0;
        const container = document.getElementById('pieMenu');

        // יצירת כפתורי התפריט
        menuItems.forEach((item, index) => {
            const button = document.createElement('button');
            button.className = 'menu-item';
            button.textContent = item.label;
            button.style.backgroundColor = item.color;
            container.appendChild(button);
        });

        function toggleMenu() {
            const items = document.querySelectorAll('.menu-item');
            isOpen = !isOpen;
            rotation += 360;
            
            document.querySelector('.center-button').style.transform = 
                `rotate(${rotation}deg)`;

            items.forEach((item, index) => {
                const angle = (index * (360 / menuItems.length)) * (Math.PI / 180);
                const radius = isOpen ? 120 : 0;
                const x = Math.cos(angle) * radius;
                const y = Math.sin(angle) * radius;
                
                item.style.transform = `translate(${x}px, ${y}px) rotate(${rotation}deg)`;
                item.style.opacity = isOpen ? '1' : '0';
            });
        }
    </script>
